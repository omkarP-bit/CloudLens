name: CI/CD — Build, Test & Deploy to Cloud Run

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
  GAR_LOCATION: ${{ secrets.GCP_REGION || 'us-central1' }}
  GAR_REPO: cloudlens
  API_SERVICE: cloudlens-api
  WEB_SERVICE: cloudlens-web

jobs:
  # ───────────────────────── Stage 1: Static Analysis ─────────────────────────
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: TypeScript check (API)
        run: pnpm --filter api build

  # ───────────────────────── Stage 2: Tests ─────────────────────────
  test:
    name: Run Tests
    needs: lint-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run API tests
        run: pnpm --filter api test

  # ───────────────────────── Stage 3: Build & Push API ─────────────────────────
  build-api:
    name: Build & Push API
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      id-token: write

    outputs:
      api-url: ${{ steps.deploy-api.outputs.url }}

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build & Push API image
        run: |
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.API_SERVICE }}"
          docker build -f apps/api/Dockerfile \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy API to Cloud Run
        id: deploy-api
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.API_SERVICE }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.API_SERVICE }}:${{ github.sha }}
          region: ${{ env.GCP_REGION }}
          env_vars: >-
            NODE_ENV=production,
            PORT=8000
          secrets: |-
            SUPABASE_URL=SUPABASE_URL:latest
            SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest
            SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest
            KMS_REGION=KMS_REGION:latest
            KMS_CMK_ARN=KMS_CMK_ARN:latest
            REDIS_URL=REDIS_URL:latest
          timeout: 300s
          concurrency: 80
          min-instances: 0
          max-instances: 10

  # ───────────────────────── Stage 4: Build & Push Web ─────────────────────────
  build-web:
    name: Build & Push Web
    needs: build-api
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build & Push Web image
        run: |
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.WEB_SERVICE }}"
          API_URL="${{ needs.build-api.outputs.api-url }}"
          docker build -f apps/web/Dockerfile \
            --build-arg VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }} \
            --build-arg VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }} \
            --build-arg VITE_API_URL=${API_URL} \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy Web to Cloud Run
        id: deploy-web
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.WEB_SERVICE }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.WEB_SERVICE }}:${{ github.sha }}
          region: ${{ env.GCP_REGION }}
          timeout: 300s
          concurrency: 200
          min-instances: 0
          max-instances: 5

      - name: Show URLs
        run: |
          echo "API deployed to: ${{ needs.build-api.outputs.api-url }}"
          echo "Web deployed to: ${{ steps.deploy-web.outputs.url }}"
